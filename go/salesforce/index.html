<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to Salesforce | RankerToolAI</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://rankertoolai.com/go/salesforce/">

  <!-- GA4 on redirect page -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-81KB8ECCVF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-81KB8ECCVF');  </script>
  <script async src="/assets/js/pint.js"></script>
</head>
<body>
  <p>Redirecting you to <a href="https://www.salesforce.com" rel="nofollow">Salesforce</a>...</p>

  <script>
    (function() {
      var ref = document.referrer ? new URL(document.referrer).pathname : 'direct';
      if (typeof gtag !== 'undefined') {
        gtag('event', 'outbound_click', { tool: 'salesforce', source_path: ref, page_type: 'bridge_no_affiliate' });
      }
      setTimeout(function(){ window.location.replace('https://www.salesforce.com'); }, 280);
    })();
  </script>
</body>
</html>
