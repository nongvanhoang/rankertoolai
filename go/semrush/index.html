<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to SEMrush | RankerToolAI</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://rankertoolai.com/go/semrush/">

  <!-- GA4 + Google Ads on redirect page -->
  <script async src="/assets/js/pint.js"></script>
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7922606734780809" crossorigin="anonymous"></script>
  
  <!-- ═══ ANALYTICS & ADS TRACKING ═══ -->
  <!-- Google tag (gtag.js) — GA4 + Google Ads -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-81KB8ECCVF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-81KB8ECCVF');
    gtag('config', 'AW-18300667802');

    // Conversion: affiliate click (fires when user clicks /go/ link)
    document.addEventListener('DOMContentLoaded', function() {
      // Forward this page's own UTM/gclid params onto /go/ links so Ad
      // campaign attribution survives the hop from landing page to the
      // affiliate redirect (the /go/ pages already read+forward these,
      // but nothing was putting them on the /go/ href before this).
      var passKeys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','gclid'];
      var incoming = new URLSearchParams(window.location.search);
      document.querySelectorAll('a[href*="/go/"]').forEach(function(el) {
        el.addEventListener('click', function() {
          try {
            var dest = new URL(el.href, window.location.href);
            passKeys.forEach(function(k) {
              if (incoming.has(k) && !dest.searchParams.has(k)) dest.searchParams.set(k, incoming.get(k));
            });
            el.href = dest.toString();
          } catch (e) {}

          gtag('event', 'conversion', {
            'send_to': 'AW-18300667802/J1N7CJ_73M4cEJqPuJZE',
            'value': 1.0,
            'currency': 'USD'
          });
          gtag('event', 'affiliate_click', {
            'tool': el.href.split('/go/')[1]?.replace(/\//g,'') || 'unknown',
            'page': window.location.pathname
          });
        });
      });

      // Conversion: 60-second engaged page view
      setTimeout(function() {
        gtag('event', 'conversion', {'send_to': 'AW-18300667802/wIkFCNeXrtMcEJqPuJZE'});
      }, 60000);
    });
  </script>

  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
      y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window,document,"clarity","script","x97zf4vn2v");
  </script>
  <!-- ══════════════════════════════════ -->
  </head>
<body>
  <p>Redirecting you to <a href="https://semrush.sjv.io/c/6077336/2829351/13053" rel="nofollow sponsored">SEMrush</a>...</p>

  <script>
  (function() {
    var ref  = document.referrer ? new URL(document.referrer).pathname : 'direct';
    var params = new URLSearchParams(window.location.search);
    var subid  = params.get('ref') || ref.replace(/\//g,'_').replace(/^_|_$/g,'') || 'direct';

    if (typeof gtag !== 'undefined') {
      gtag('event', 'affiliate_click', {
        tool:        'semrush',
        source_path: ref,
        sub_id:      subid,
      });
    }

    var dest = new URL('https://semrush.sjv.io/c/6077336/2829351/13053');
    dest.searchParams.set('subId1', subid);

    setTimeout(function(){ window.location.replace(dest.toString()); }, 280);
  })();
  </script>
</body>
</html>
