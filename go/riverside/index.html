<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to Riverside.fm | RankerToolAI</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://rankertoolai.com/go/riverside/">

  <!-- GA4 + Google Ads on redirect page -->
  <script async src="/assets/js/pint.js"></script>

  <!-- ═══ ANALYTICS & ADS TRACKING ═══ -->
  <!-- Google tag (gtag.js) — GA4 + Google Ads -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-81KB8ECCVF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-81KB8ECCVF');
    gtag('config', 'AW-17663925702');

    // Conversion: affiliate click (fires when user clicks /go/ link)
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('a[href*="/go/"]').forEach(function(el) {
        el.addEventListener('click', function() {
          gtag('event', 'conversion', {
            'send_to': 'AW-17663925702/zc7PCJ-9nMscEMa76OZB',
            'value': 1.0,
            'currency': 'USD'
          });
          gtag('event', 'affiliate_click', {
            'tool': el.href.split('/go/')[1]?.replace(/\//g,'') || 'unknown',
            'page': window.location.pathname
          });
        });
      });

      // Conversion: 60-second engaged page view
      setTimeout(function() {
        gtag('event', 'conversion', {'send_to': 'AW-17663925702/DfXPCNLAucscEMa76OZB'});
      }, 60000);
    });
  </script>

  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
      y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window,document,"clarity","script","x97zf4vn2v");
  </script>
  <!-- ══════════════════════════════════ -->
  </head>
<body>
  <p>Redirecting you to <a href="https://riverside.fm/" rel="nofollow">Riverside.fm</a>...</p>

    <script>
    (function() {
      var tool = document.title.match(/Redirecting to (.+?) \|/)?.[1] || '';
      var ref  = document.referrer ? new URL(document.referrer).pathname : 'direct';
      var params = new URLSearchParams(window.location.search);
      var subid  = params.get('ref') || ref.replace(/\//g,'_').replace(/^_|_$/g,'') || 'direct';

      if (typeof gtag !== 'undefined') {
        gtag('event', 'affiliate_click', {
          tool:        document.querySelector('[data-tool]')?.dataset.tool || subid,
          source_path: ref,
          sub_id:      subid,
          utm_source:  params.get('utm_source') || '',
          utm_medium:  params.get('utm_medium') || '',
        });
      }

      var destEl = document.querySelector('a[href]');
      if (!destEl) return;
      var dest = new URL(destEl.href);
      ['utm_source','utm_medium','utm_campaign','utm_content','gclid'].forEach(function(k){
        if (params.has(k)) dest.searchParams.set(k, params.get(k));
      });
      dest.searchParams.set('ref', subid);

      setTimeout(function(){ window.location.replace(dest.toString()); }, 280);
    })();
  </script>
</body>
</html>
