    <rect x="-5" y="-34" width="10" height="24" rx="5" transform="rotate(120)"/>
    <rect x="-5" y="-34" width="10" height="24" rx="5" transform="rotate(150)"/>
    <rect x="-5" y="-34" width="10" height="24" rx="5" transform="rotate(180)"/>
    <rect x="-5" y="-34" width="10" height="24" rx="5" transform="rotate(210)"/>
    <rect x="-5" y="-34" width="10" height="24" rx="5" transform="rotate(240)"/>
    <rect x="-5" y="-34" width="10" height="24" rx="5" transform="rotate(270)"/>
