<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="18" fill="url(#ss)"/>
  <!-- Clock/timing icon -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="white" stroke-width="5" opacity="0.9"/>
  <!-- Hour marks -->
  <line x1="50" y1="26" x2="50" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="68" x2="50" y2="74" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="26" y1="50" x2="32" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="68" y1="50" x2="74" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Clock hands -->
  <line x1="50" y1="50" x2="50" y2="30" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="63" y2="57" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="50" r="4" fill="white"/>
</svg>
