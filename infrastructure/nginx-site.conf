# rankertoolai.com — Nginx Site Configuration
# Production-hardened | Updated: 2026-06-17
# Place at: /etc/nginx/sites-available/rankertoolai.com
# Symlink: ln -s /etc/nginx/sites-available/rankertoolai.com /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name rankertoolai.com www.rankertoolai.com;
    return 301 https://rankertoolai.com$request_uri;
}

# Redirect www → non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rankertoolai.com;

    ssl_certificate     /etc/letsencrypt/live/rankertoolai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rankertoolai.com/privkey.pem;

    return 301 https://rankertoolai.com$request_uri;
}

# Primary server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rankertoolai.com;

    root /var/www/rankertoolai/html;
    index index.html;

    # SSL Configuration
    ssl_certificate     /etc/letsencrypt/live/rankertoolai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rankertoolai.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Hide Nginx version
    server_tokens off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com; frame-ancestors 'none';" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/html
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 1024;

    # Charset
    charset utf-8;

    # Affiliate redirect links (clean URLs, trackable)
    location /go/ {
        # Add redirects here per tool:
        # Example:
        # location = /go/jasper/ { return 301 "https://www.jasper.ai/?fpr=rankertoolai"; }
