    # Static file caching
    location ~* \.(css|js|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML — short cache + resource preconnect hints
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        # Early connection hints for Google Fonts and Analytics (improves LCP ~150-300ms)
        add_header Link "<https://fonts.googleapis.com>; rel=preconnect, <https://fonts.gstatic.com>; rel=preconnect; crossorigin, <https://www.googletagmanager.com>; rel=preconnect, <https://www.google-analytics.com>; rel=preconnect" always;
        # Preload critical CSS for faster paint
        add_header Link "</assets/css/base.css>; rel=preload; as=style" always;
    }

    # robots.txt and sitemap — no cache
    location = /robots.txt {
        expires -1;
        add_header Cache-Control "no-cache";
        access_log off;
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Main location — try files, clean URLs
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Rate limiting (define zones in nginx.conf http block)
    # limit_req zone=general burst=20 nodelay;

    # Block common exploit patterns
    location ~* (\.php|\.asp|\.env|\.git|\.htaccess|\.htpasswd|wp-login|xmlrpc) {
        return 444;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;

    # Logging
    access_log /var/log/nginx/rankertoolai.access.log;
    error_log  /var/log/nginx/rankertoolai.error.log warn;
}
